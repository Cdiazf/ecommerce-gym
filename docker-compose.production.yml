services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  gateway:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s

  catalog:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/microservices/catalog/main.js"]

  cart:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/microservices/cart/main.js"]

  inventory:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/microservices/inventory/main.js"]

  orders:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/microservices/orders/main.js"]

  payments:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/microservices/payments/main.js"]

  shipping:
    image: ${BACKEND_IMAGE:-agent-ai-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    command: ["node", "dist/microservices/shipping/main.js"]

  frontend:
    image: ${FRONTEND_IMAGE:-agent-ai-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_prod_data:
  caddy_data:
  caddy_config:
